<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Register — Murious 20.0 | JUIT Tech Fest</title>

    <meta
      name="description"
      content="Register for Murious 20.0 events — Coding Contest, Hackathon, Robotics Challenge & more. Secure your spot now!"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/svg+xml"
      href="assets/images/Murious Logo.svg"
    />

    <link rel="stylesheet" href="css/register.css" />
  </head>

  <body>
    <div class="starfield" id="starfield"></div>

    <div class="reg-page">
      <a href="index.html" class="back-link">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M19 12H5" />
          <path d="M12 19l-7-7 7-7" />
        </svg>
        Back to Murious
      </a>

      <header class="reg-header">
        <span class="section-tag">✦ Join the Adventure</span>

        <h1 class="page-title">Register for Murious 20.0</h1>

        <div class="title-ornament"></div>

        <p class="page-subtitle">
          Secure your spot in the ultimate tech fest. Choose your event, pay
          securely, and get ready for an interstellar experience.
        </p>
      </header>

      <div class="reg-card">
        <div class="reg-loading-overlay" id="regLoading">
          <div class="reg-spinner"></div>
          <span>Processing Payment...</span>
        </div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="regName">Full Name</label>
            <input
              type="text"
              id="regName"
              placeholder="Your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="regEmail">Email Address</label>
            <input
              type="email"
              id="regEmail"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="regPhone">Phone Number</label>
            <input
              type="tel"
              id="regPhone"
              placeholder="10-digit phone number"
              required
            />
          </div>

          <div class="form-group">
            <label for="regCollege">College Name</label>
            <input
              type="text"
              id="regCollege"
              placeholder="Your college / university"
              required
            />
          </div>

          <div class="form-group">
            <label for="participationType">Participation Type</label>
            <select id="participationType">
              <option value="single">Single Participant</option>
              <option value="team">Team</option>
            </select>
          </div>

          <!-- TEAM MEMBERS -->

          <div id="teamSection" style="display: none">
            <div class="form-group">
              <label>Member 1 Name</label>
              <input type="text" id="member1Name" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 1 Roll No</label>
              <input type="text" id="member1Roll" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 1 Phone</label>
              <input
                type="tel"
                id="member1Phone"
                placeholder="Optional"
                pattern="[0-9]{10}"
              />
            </div>

            <div class="form-group">
              <label>Member 2 Name</label>
              <input type="text" id="member2Name" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 2 Roll No</label>
              <input type="text" id="member2Roll" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 2 Phone</label>
              <input
                type="tel"
                id="member2Phone"
                placeholder="Optional"
                pattern="[0-9]{10}"
              />
            </div>

            <div class="form-group">
              <label>Member 3 Name</label>
              <input type="text" id="member3Name" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 3 Roll No</label>
              <input type="text" id="member3Roll" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 3 Phone</label>
              <input
                type="tel"
                id="member3Phone"
                placeholder="Optional"
                pattern="[0-9]{10}"
              />
            </div>

            <div class="form-group">
              <label>Member 4 Name</label>
              <input type="text" id="member4Name" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 4 Roll No</label>
              <input type="text" id="member4Roll" placeholder="Optional" />
            </div>

            <div class="form-group">
              <label>Member 4 Phone</label>
              <input
                type="tel"
                id="member4Phone"
                placeholder="Optional"
                pattern="[0-9]{10}"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Select Event</label>

            <div class="event-grid" id="eventGrid">
              <label
                class="event-card"
                data-event="HACKATHON"
                data-fee="80"
                style="grid-column: span 2"
              >
                <input
                  type="checkbox"
                  name="events"
                  value="HACKATHON"
                  data-fee="80"
                />
                <div class="event-card-inner">
                  <span class="event-icon">
                    <img
                      src="https://cdn-icons-png.flaticon.com/512/2721/2721266.png"
                      class="event-img"
                    />
                  </span>
                  <span class="event-name">HACKATHON </span>
                  <span>(MIN 3 AND MAX 5 PARTICIPANTS ALLOWED)</span>
                  <span class="event-fee">₹80 / member</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label class="event-card" data-event="REEL RUMBLE" data-fee="150">
                <input
                  type="checkbox"
                  name="events"
                  value="REEL RUMBLE"
                  data-fee="150"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/reel.png" class="event-img"
                  /></span>
                  <span class="event-name">REEL RUMBLE</span>
                  <span class="event-fee">₹100</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label
                class="event-card"
                data-event="the triwizard contest"
                data-fee="200"
              >
                <input
                  type="checkbox"
                  name="events"
                  value="the triwizard contest"
                  data-fee="200"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/TREASURE.png" class="event-img"
                  /></span>
                  <span class="event-name">the triwizard contest</span>
                  <span class="event-fee">₹200</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label
                class="event-card"
                data-event="CODE IN DARK"
                data-fee="150"
              >
                <input
                  type="checkbox"
                  name="events"
                  value="CODE IN DARK"
                  data-fee="150"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/codeinblack.png" class="event-img"
                  /></span>
                  <span class="event-name">CODING PREMIER LEAGUE</span>
                  <span class="event-fee">₹150</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label
                class="event-card"
                data-event="PROMPT TO DESIGN"
                data-fee="80"
              >
                <input
                  type="checkbox"
                  name="events"
                  value="PROMPT TO DESIGN"
                  data-fee="80"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/cloud.png" class="event-img"
                  /></span>
                  <span class="event-name">PROMPT TO DESIGN</span>
                  <span class="event-fee">₹80</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label class="event-card" data-event="CODE ROYALE" data-fee="80">
                <input
                  type="checkbox"
                  name="events"
                  value="CODE ROYALE"
                  data-fee="80"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/laptop.png" class="event-img"
                  /></span>
                  <span class="event-name">CODE ROYALE</span>
                  <span class="event-fee">₹80</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label class="event-card" data-event="E-SPORTS" data-fee="80">
                <input
                  type="checkbox"
                  name="events"
                  value="E-SPORTS"
                  data-fee="80"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/console.png" class="event-img"
                  /></span>
                  <span class="event-name">E-SPORTS</span>
                  <span class="event-fee">₹80</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label class="event-card" data-event="FRAME IT" data-fee="80">
                <input
                  type="checkbox"
                  name="events"
                  value="FRAME IT"
                  data-fee="80"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/camera.png" class="event-img"
                  /></span>
                  <span class="event-name">FRAME IT</span>
                  <span class="event-fee">₹80</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              

              <label class="event-card" data-event="TECH TRIVIA" data-fee="80">
                <input
                  type="checkbox"
                  name="events"
                  value="TECH TRIVIA"
                  data-fee="80"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/QUIZ.png" class="event-img"
                  /></span>
                  <span class="event-name">TECH TRIVIA</span>
                  <span class="event-fee">₹80</span>
                </div>
                <div class="event-check">✓</div>
              </label>

              <label class="event-card" data-event="OPEN MIC" data-fee="80">
                <input
                  type="checkbox"
                  name="events"
                  value="OPEN MIC"
                  data-fee="80"
                />
                <div class="event-card-inner">
                  <span class="event-icon"
                    ><img src="images/openmic1.png" class="event-img"
                  /></span>
                  <span class="event-name">OPEN MIC</span>
                  <span class="event-fee">₹80</span>
                </div>
                <div class="event-check">✓</div>
              </label>
            </div>
          </div>

          <div class="fee-display" id="feeDisplay" style="display: none">
            <div class="fee-left">
              <span class="fee-label">Total Fee</span>
              <span class="fee-count" id="feeCount">0 events selected</span>
            </div>
            <span class="fee-amount" id="feeAmount">₹0</span>
          </div>

          <button type="submit" class="reg-submit" id="registerBtn">
            <span class="btn-text">⚡ Register & Pay</span>
            <span class="btn-magic">✦ Mischief Managed! ✦</span>
          </button>
        </form>
      </div>

      <footer class="reg-footer">
        <p>
          ✦ Murious 20.0 — A
          <a href="https://jyc.co.in/" target="_blank">JYC</a>
          Technical Festival · JUIT Solan
        </p>
      </footer>
    </div>

    <script>
      document.querySelectorAll('input[name="events"]').forEach((cb) => {
        cb.addEventListener("change", function () {
          document.querySelectorAll('input[name="events"]').forEach((x) => {
            if (x !== this) x.checked = false;
          });
        });
      });
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
